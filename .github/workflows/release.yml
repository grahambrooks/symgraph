name: Symgraph Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: symgraph-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: symgraph-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: symgraph-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: symgraph-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: symgraph-windows-x64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/symgraph dist/
          chmod +x dist/symgraph

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\symgraph.exe dist\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  package:
    name: Package MCPB
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Prepare bundle structure
        run: |
          mkdir -p bundle/bin

          # Copy manifest
          cp manifest.json bundle/

          # Update manifest version from tag
          VERSION=${GITHUB_REF#refs/tags/v}
          jq --arg v "$VERSION" '.version = $v' bundle/manifest.json > bundle/manifest.tmp.json
          mv bundle/manifest.tmp.json bundle/manifest.json

      - name: Create platform-specific bundles
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}

          # macOS x64
          mkdir -p bundle-darwin-x64/bin
          cp bundle/manifest.json bundle-darwin-x64/
          cp artifacts/symgraph-darwin-x64/symgraph bundle-darwin-x64/bin/
          chmod +x bundle-darwin-x64/bin/symgraph
          cd bundle-darwin-x64 && zip -r ../symgraph-${VERSION}-darwin-x64.mcpb . && cd ..

          # macOS arm64
          mkdir -p bundle-darwin-arm64/bin
          cp bundle/manifest.json bundle-darwin-arm64/
          cp artifacts/symgraph-darwin-arm64/symgraph bundle-darwin-arm64/bin/
          chmod +x bundle-darwin-arm64/bin/symgraph
          cd bundle-darwin-arm64 && zip -r ../symgraph-${VERSION}-darwin-arm64.mcpb . && cd ..

          # Linux x64
          mkdir -p bundle-linux-x64/bin
          cp bundle/manifest.json bundle-linux-x64/
          cp artifacts/symgraph-linux-x64/symgraph bundle-linux-x64/bin/
          chmod +x bundle-linux-x64/bin/symgraph
          cd bundle-linux-x64 && zip -r ../symgraph-${VERSION}-linux-x64.mcpb . && cd ..

          # Linux arm64
          mkdir -p bundle-linux-arm64/bin
          cp bundle/manifest.json bundle-linux-arm64/
          cp artifacts/symgraph-linux-arm64/symgraph bundle-linux-arm64/bin/
          chmod +x bundle-linux-arm64/bin/symgraph
          cd bundle-linux-arm64 && zip -r ../symgraph-${VERSION}-linux-arm64.mcpb . && cd ..

          # Windows x64
          mkdir -p bundle-windows-x64/bin
          cp bundle/manifest.json bundle-windows-x64/
          cp artifacts/symgraph-windows-x64/symgraph.exe bundle-windows-x64/bin/
          cd bundle-windows-x64 && zip -r ../symgraph-${VERSION}-windows-x64.mcpb . && cd ..

      - name: Create universal macOS bundle
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}

          # Create universal binary for macOS
          mkdir -p bundle-darwin-universal/bin
          cp bundle/manifest.json bundle-darwin-universal/

          # Use lipo to create universal binary (if both exist)
          if [ -f artifacts/symgraph-darwin-x64/symgraph ] && [ -f artifacts/symgraph-darwin-arm64/symgraph ]; then
            # Note: lipo only works on macOS, so we'll just include arm64 as primary
            cp artifacts/symgraph-darwin-arm64/symgraph bundle-darwin-universal/bin/
          fi
          chmod +x bundle-darwin-universal/bin/symgraph
          cd bundle-darwin-universal && zip -r ../symgraph-${VERSION}-darwin-universal.mcpb . && cd ..

      - name: Upload MCPB bundles
        uses: actions/upload-artifact@v4
        with:
          name: mcpb-bundles
          path: "*.mcpb"

  release:
    name: Create Release
    needs: [build, package]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare versioned manifest
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          jq --arg v "$VERSION" '.version = $v' manifest.json > manifest-versioned.json

      - name: Prepare release assets
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mkdir -p release

          # Create tarballs for standalone binaries (include manifest.json)
          cp manifest-versioned.json artifacts/symgraph-linux-x64/manifest.json
          cd artifacts/symgraph-linux-x64
          tar -czf ../../release/symgraph-${VERSION}-linux-x64.tar.gz symgraph manifest.json
          cd ../..

          cp manifest-versioned.json artifacts/symgraph-linux-arm64/manifest.json
          cd artifacts/symgraph-linux-arm64
          tar -czf ../../release/symgraph-${VERSION}-linux-arm64.tar.gz symgraph manifest.json
          cd ../..

          cp manifest-versioned.json artifacts/symgraph-darwin-x64/manifest.json
          cd artifacts/symgraph-darwin-x64
          tar -czf ../../release/symgraph-${VERSION}-darwin-x64.tar.gz symgraph manifest.json
          cd ../..

          cp manifest-versioned.json artifacts/symgraph-darwin-arm64/manifest.json
          cd artifacts/symgraph-darwin-arm64
          tar -czf ../../release/symgraph-${VERSION}-darwin-arm64.tar.gz symgraph manifest.json
          cd ../..

          cp manifest-versioned.json artifacts/symgraph-windows-x64/manifest.json
          cd artifacts/symgraph-windows-x64
          zip ../../release/symgraph-${VERSION}-windows-x64.zip symgraph.exe manifest.json
          cd ../..

          # Copy MCPB bundles
          cp artifacts/mcpb-bundles/*.mcpb release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  devcontainer-feature:
    name: Publish Devcontainer Feature
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update feature version from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          jq --arg v "$VERSION" '.version = $v' \
            devcontainer-feature/src/symgraph/devcontainer-feature.json > tmp.json
          mv tmp.json devcontainer-feature/src/symgraph/devcontainer-feature.json

      - name: Publish devcontainer feature
        uses: devcontainers/action@v1
        with:
          publish-features: true
          base-path-to-features: devcontainer-feature/src
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  crates-io:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify Cargo.toml version matches tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -n1 | sed -E 's/version = "(.*)"/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)" >&2
            exit 1
          fi

      - name: Publish to crates.io
        run: cargo publish --token "${CARGO_REGISTRY_TOKEN}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
